<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">
      {{ 'AUTH.LOGIN_TITLE' | translate }}
    </h1>

    <!-- Error -->
    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>
      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ 'AUTH.EMAIL' | translate }}
        </label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          autocomplete="email"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ 'AUTH.PASSWORD' | translate }}
        </label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold rounded-lg transition-colors"
      >
        @if (loading()) {
          {{ 'AUTH.LOGGING_IN' | translate }}
        } @else {
          {{ 'AUTH.LOGIN_BUTTON' | translate }}
        }
      </button>
    </form>

  </div>
</div>
